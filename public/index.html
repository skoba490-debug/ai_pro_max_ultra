<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI PRO MAX ULTRA</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}
header{
  text-align:center;
  padding:12px;
  background:#1e293b;
}
#chat{
  height:50vh;
  overflow:auto;
  padding:10px;
}
.msg{
  margin:8px 0;
  padding:10px;
  border-radius:12px;
}
.user{background:#2563eb;text-align:right}
.bot{background:#374151}

.controls{
  display:flex;
  gap:5px;
  padding:10px;
}
input,button,select{
  padding:10px;
  border-radius:10px;
  border:none;
}
button{background:#6366f1;color:#fff}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
  padding:10px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

img{
  max-width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2>🚀 AI PRO MAX ULTRA</h2>
</header>

<div id="chat"></div>

<div class="controls">
  <input id="input" placeholder="Напиши или нажми 🎤">
  <button onclick="send()">➡️</button>
  <button onclick="voice()">🎤</button>
</div>

<div class="grid">
  <div class="card" onclick="genImage()">🎨 Image</div>
  <div class="card" onclick="tarot()">🔮 Таро</div>
  <div class="card" onclick="rune()">🪬 Руны</div>
  <div class="card" onclick="iching()">☯ И-Цзин</div>
</div>

<div id="gallery"></div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const gallery=document.getElementById("gallery");

/* ---------- CHAT ---------- */
function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* ---------- SEND ---------- */
async function send(){
  const text=input.value;
  if(!text)return;

  add(text,"user");
  input.value="";

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  const data=await res.json();
  add(data.reply,"bot");
  speak(data.reply);
  saveMemory(text,data.reply);
}

/* ---------- VOICE INPUT ---------- */
function voice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("No voice");return;}
  const r=new SR();
  r.lang="ru-RU";
  r.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };
  r.start();
}

/* ---------- VOICE OUTPUT ---------- */
function speak(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ru-RU";
  speechSynthesis.speak(u);
}

/* ---------- IMAGE GENERATION ---------- */
async function genImage(){
  const prompt=prompt("Опиши изображение:");
  if(!prompt)return;

  const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

  const img=document.createElement("img");
  img.src=url;

  const btn=document.createElement("button");
  btn.textContent="⬇️ Скачать";
  btn.onclick=()=>download(url);

  const box=document.createElement("div");
  box.appendChild(img);
  box.appendChild(btn);

  gallery.appendChild(box);
}

/* ---------- DOWNLOAD ---------- */
function download(url){
  const a=document.createElement("a");
  a.href=url;
  a.download="ai_image.png";
  a.click();
}

/* ---------- MEMORY (7 дней) ---------- */
function saveMemory(q,a){
  let mem=JSON.parse(localStorage.getItem("mem")||"[]");
  mem.push({q,a,time:Date.now()});
  mem=mem.filter(x=>Date.now()-x.time<7*24*60*60*1000);
  localStorage.setItem("mem",JSON.stringify(mem));
}

/* ---------- TAROT ---------- */
function tarot(){
  const cards=["Шут","Маг","Императрица","Башня","Солнце"];
  animate(cards[Math.floor(Math.random()*cards.length)]);
}

/* ---------- RUNES ---------- */
function rune(){
  const runes=["ᚠ","ᚢ","ᚦ","ᚨ","ᚱ"];
  animate(runes[Math.floor(Math.random()*runes.length)]);
}

/* ---------- I CHING ---------- */
function iching(){
  const hex=["☰","☱","☲","☳","☴","☵","☶","☷"];
  animate(hex[Math.floor(Math.random()*hex.length)]);
}

/* ---------- ANIMATION ---------- */
function animate(symbol){
  const d=document.createElement("div");
  d.style.fontSize="50px";
  d.style.textAlign="center";
  d.style.margin="20px";
  d.textContent=symbol;
  d.style.opacity=0;

  document.body.appendChild(d);

  let o=0;
  const i=setInterval(()=>{
    o+=0.1;
    d.style.opacity=o;
    if(o>=1)clearInterval(i);
  },50);
}
</script>

</body>
</html>
